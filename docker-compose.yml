version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: football_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: football
      POSTGRES_PASSWORD: football123
      POSTGRES_DB: football
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
